<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My To-Do App</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;padding:40px 16px;transition:all 0.3s}
.app-container{background:#fff;border-radius:24px;padding:32px 28px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,0.2);height:fit-content}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
header{text-align:center;margin-bottom:24px}
header h1{font-size:26px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
#task-count{font-size:13px;color:#888}
#theme-btn{padding:8px 14px;border:2px solid #e0e0e0;border-radius:20px;background:white;font-size:13px;font-family:'Poppins',sans-serif;cursor:pointer;font-weight:600;transition:all 0.3s;white-space:nowrap}
.search-section{margin-bottom:14px}
#search-input{width:100%;padding:12px 16px;border:2px solid #e8e8e8;border-radius:14px;font-size:14px;font-family:'Poppins',sans-serif;outline:none;transition:all 0.3s;color:#333;background:#f8f9ff}
#search-input:focus{border-color:#667eea;background:white;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
.add-task-section{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
#task-input{flex:1;min-width:140px;padding:12px 16px;border:2px solid #e8e8e8;border-radius:14px;font-size:14px;font-family:'Poppins',sans-serif;outline:none;transition:all 0.3s;color:#333}
#task-input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
#priority-select,#deadline-input{padding:12px 10px;border:2px solid #e8e8e8;border-radius:14px;font-size:13px;font-family:'Poppins',sans-serif;background:white;color:#333;cursor:pointer;outline:none;transition:all 0.3s}
#add-btn{padding:12px 20px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:14px;font-size:14px;font-family:'Poppins',sans-serif;font-weight:600;cursor:pointer;transition:all 0.3s;white-space:nowrap}
#add-btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(102,126,234,0.4)}
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:2px solid #e8e8e8;border-radius:20px;background:white;font-size:12px;font-family:'Poppins',sans-serif;font-weight:600;cursor:pointer;transition:all 0.3s;color:#888}
.filter-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);border-color:transparent;color:white}
#task-list{list-style:none;display:flex;flex-direction:column;gap:10px}
#task-list:empty::after{content:"🎉 No tasks yet! Add one above.";display:block;text-align:center;color:#bbb;font-size:14px;padding:40px 0}
.task-item{display:flex;align-items:center;gap:12px;background:#f8f9ff;padding:14px 16px;border-radius:14px;border:2px solid #ebebeb;transition:all 0.3s;animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.task-item:hover{box-shadow:0 4px 15px rgba(0,0,0,0.08);transform:translateY(-1px)}
.task-item.completed{opacity:0.55;background:#f5f5f5}
.task-item.overdue{border-color:#ff4757;background:#fff5f5}
.task-content{flex:1;min-width:0}
.task-text{font-size:14px;color:#333;display:block;word-break:break-word}
.task-item.completed .task-text{text-decoration:line-through;color:#aaa}
.deadline-text{font-size:11px;color:#999;margin-top:3px;display:block}
.overdue .deadline-text{color:#ff4757;font-weight:600}
.task-checkbox{width:18px;height:18px;cursor:pointer;accent-color:#667eea;flex-shrink:0}
.priority-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.priority-High{background:#ffe0e0;color:#d63031}
.priority-Medium{background:#fff3cd;color:#e17055}
.priority-Low{background:#d4edda;color:#27ae60}
.overdue-badge{font-size:11px;background:#ff4757;color:white;padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap;flex-shrink:0}
.task-actions{display:flex;gap:4px;flex-shrink:0}
.delete-btn,.edit-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:4px 6px;border-radius:8px;transition:background 0.2s}
.delete-btn:hover{background:#ffe0e0}
.edit-btn:hover{background:#e8f4fd}
.stats-bar{display:flex;justify-content:space-around;background:#f8f9ff;border-radius:14px;padding:12px;margin-bottom:16px;gap:8px}
.stat-item{text-align:center}
.stat-number{font-size:20px;font-weight:700;color:#667eea;display:block}
.stat-label{font-size:10px;color:#999;font-weight:500}
.progress-section{margin-bottom:16px}
.progress-bar-bg{background:#e8e8e8;border-radius:10px;height:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:10px;transition:width 0.5s ease}
.progress-text{font-size:11px;color:#999;text-align:right;margin-top:4px}
body.dark{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)}
body.dark .app-container{background:#1e2a3a;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
body.dark header h1{color:#fff}
body.dark #task-count{color:#aaa}
body.dark #task-input,body.dark #search-input,body.dark #priority-select,body.dark #deadline-input{background:#162032;border-color:#2d4059;color:#fff}
body.dark #add-btn{background:linear-gradient(135deg,#e94560,#c0392b)}
body.dark #theme-btn{background:#162032;border-color:#2d4059;color:#fff}
body.dark .task-item{background:#162032;border-color:#2d4059}
body.dark .task-item.overdue{background:#2d1515;border-color:#ff4757}
body.dark .task-text{color:#e0e0e0}
body.dark .deadline-text{color:#aaa}
body.dark .stats-bar{background:#162032}
body.dark .stat-number{color:#a29bfe}
body.dark .filter-btn{background:#162032;border-color:#2d4059;color:#aaa}
body.dark .filter-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
body.dark .progress-bar-bg{background:#2d4059}
</style>
</head>
<body>
<div class="app-container">
<header>
<div class="header-top">
<h1>📝 My To-Do App</h1>
<button id="theme-btn">🌙 Dark</button>
</div>
<p id="task-count">0 tasks remaining</p>
</header>
<div class="stats-bar">
<div class="stat-item"><span class="stat-number" id="stat-total">0</span><span class="stat-label">Total</span></div>
<div class="stat-item"><span class="stat-number" id="stat-done">0</span><span class="stat-label">Done</span></div>
<div class="stat-item"><span class="stat-number" id="stat-pending">0</span><span class="stat-label">Pending</span></div>
<div class="stat-item"><span class="stat-number" id="stat-overdue">0</span><span class="stat-label">Overdue</span></div>
</div>
<div class="progress-section">
<div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
<p class="progress-text" id="progress-text">0% completed</p>
</div>
<div class="search-section"><input type="text" id="search-input" placeholder="🔍 Search tasks..."/></div>
<div class="filter-tabs">
<button class="filter-btn active" onclick="setFilter('all',this)">All</button>
<button class="filter-btn" onclick="setFilter('pending',this)">⏳ Pending</button>
<button class="filter-btn" onclick="setFilter('completed',this)">✅ Done</button>
<button class="filter-btn" onclick="setFilter('overdue',this)">⚠️ Overdue</button>
<button class="filter-btn" onclick="setFilter('high',this)">🔴 High</button>
</div>
<div class="add-task-section">
<input type="text" id="task-input" placeholder="Write a new task..."/>
<select id="priority-select">
<option value="Low">🟢 Low</option>
<option value="Medium" selected>🟡 Medium</option>
<option value="High">🔴 High</option>
</select>
<input type="date" id="deadline-input"/>
<button id="add-btn">➕ Add</button>
</div>
<ul id="task-list"></ul>
</div>
<script>
const taskInput=document.getElementById('task-input');
const addBtn=document.getElementById('add-btn');
const taskList=document.getElementById('task-list');
const taskCount=document.getElementById('task-count');
const prioritySelect=document.getElementById('priority-select');
const searchInput=document.getElementById('search-input');
const themeBtn=document.getElementById('theme-btn');
const deadlineInput=document.getElementById('deadline-input');
const progressFill=document.getElementById('progress-fill');
const progressText=document.getElementById('progress-text');
let tasks=JSON.parse(localStorage.getItem('tasks'))||[];
let currentFilter='all';
function saveTasks(){localStorage.setItem('tasks',JSON.stringify(tasks))}
function getToday(){return new Date().toISOString().split('T')[0]}
function updateStats(){
const today=getToday();
const total=tasks.length;
const done=tasks.filter(t=>t.completed).length;
const pending=tasks.filter(t=>!t.completed).length;
const overdue=tasks.filter(t=>t.deadline&&t.deadline<today&&!t.completed).length;
const percent=total===0?0:Math.round((done/total)*100);
document.getElementById('stat-total').textContent=total;
document.getElementById('stat-done').textContent=done;
document.getElementById('stat-pending').textContent=pending;
document.getElementById('stat-overdue').textContent=overdue;
progressFill.style.width=percent+'%';
progressText.textContent=percent+'% completed';
taskCount.textContent=pending+' task'+(pending!==1?'s':'')+' remaining';
}
function setFilter(filter,btn){
currentFilter=filter;
document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
renderTasks();
}
function renderTasks(){
taskList.innerHTML='';
const today=getToday();
const searchText=searchInput.value.toLowerCase();
let filtered=tasks.filter(function(task){
const matchSearch=task.text.toLowerCase().includes(searchText);
const isOverdue=task.deadline&&task.deadline<today&&!task.completed;
if(!matchSearch)return false;
if(currentFilter==='pending')return !task.completed;
if(currentFilter==='completed')return task.completed;
if(currentFilter==='overdue')return isOverdue;
if(currentFilter==='high')return task.priority==='High';
return true;
});
if(filtered.length===0){
taskList.innerHTML='<li style="text-align:center;color:#bbb;padding:30px 0;font-size:14px">😊 No tasks here!</li>';
updateStats();return;
}
filtered.forEach(function(task){
const index=tasks.indexOf(task);
const isOverdue=task.deadline&&task.deadline<today&&!task.completed;
const li=document.createElement('li');
li.className='task-item'+(task.completed?' completed':'')+(isOverdue?' overdue':'');
let deadlineFormatted='';
if(task.deadline){
const d=new Date(task.deadline+'T00:00:00');
deadlineFormatted=d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
li.innerHTML=`
<input type="checkbox" class="task-checkbox" ${task.completed?'checked':''} onchange="toggleTask(${index})"/>
<div class="task-content">
<span class="task-text">${task.text}</span>
${task.deadline?`<span class="deadline-text">📅 ${deadlineFormatted}${isOverdue?' — Overdue!':''}</span>`:''}
</div>
<span class="priority-badge priority-${task.priority}">${task.priority}</span>
${isOverdue?'<span class="overdue-badge">⚠️</span>':''}
<div class="task-actions">
<button class="edit-btn" onclick="editTask(${index})">✏️</button>
<button class="delete-btn" onclick="deleteTask(${index})">🗑️</button>
</div>`;
taskList.appendChild(li);
});
updateStats();
}
function addTask(){
const text=taskInput.value.trim();
if(text===''){alert('Please write a task first!');return;}
tasks.unshift({id:Date.now(),text:text,completed:false,priority:prioritySelect.value,deadline:deadlineInput.value});
saveTasks();renderTasks();
taskInput.value='';deadlineInput.value='';taskInput.focus();
}
function deleteTask(index){
if(confirm('Delete this task?')){tasks.splice(index,1);saveTasks();renderTasks();}
}
function toggleTask(index){
tasks[index].completed=!tasks[index].completed;saveTasks();renderTasks();
}
function editTask(index){
const newText=prompt('Edit task:',tasks[index].text);
if(newText&&newText.trim()!==''){tasks[index].text=newText.trim();saveTasks();renderTasks();}
}
searchInput.addEventListener('input',renderTasks);
addBtn.addEventListener('click',addTask);
taskInput.addEventListener('keypress',function(e){if(e.key==='Enter')addTask();});
themeBtn.addEventListener('click',function(){
document.body.classList.toggle('dark');
const isDark=document.body.classList.contains('dark');
themeBtn.textContent=isDark?'☀️ Light':'🌙 Dark';
localStorage.setItem('theme',isDark?'dark':'light');
});
if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');themeBtn.textContent='☀️ Light';}
renderTasks();
</script>
</body>
</html>
