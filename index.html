<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>To-Do App</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;justify-content:center;padding:40px 16px}
.app-container{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:520px;box-shadow:0 10px 40px rgba(0,0,0,0.1);height:fit-content}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
header{text-align:center;margin-bottom:28px}
header h1{font-size:28px;font-weight:700;color:#1a1a2e;margin-bottom:6px}
#task-count{font-size:14px;color:#888}
#theme-btn{padding:8px 14px;border:2px solid #e0e0e0;border-radius:20px;background:white;font-size:13px;font-family:'Poppins',sans-serif;cursor:pointer;font-weight:600}
.search-section{margin-bottom:16px}
#search-input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:12px;font-size:15px;font-family:'Poppins',sans-serif;outline:none;color:#333;background:#f8f9ff}
#search-input:focus{border-color:#6c63ff;background:white}
.add-task-section{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
#task-input{flex:1;min-width:150px;padding:12px 16px;border:2px solid #e0e0e0;border-radius:12px;font-size:15px;font-family:'Poppins',sans-serif;outline:none;color:#333}
#task-input:focus{border-color:#6c63ff}
#priority-select{padding:12px 10px;border:2px solid #e0e0e0;border-radius:12px;font-size:14px;font-family:'Poppins',sans-serif;background:white;color:#333;cursor:pointer;outline:none}
#add-btn{padding:12px 20px;background:#6c63ff;color:white;border:none;border-radius:12px;font-size:15px;font-family:'Poppins',sans-serif;font-weight:600;cursor:pointer}
#task-list{list-style:none;display:flex;flex-direction:column;gap:12px}
#task-list:empty::after{content:"🎉 No tasks yet! Add one above.";display:block;text-align:center;color:#bbb;font-size:14px;padding:30px 0}
.task-item{display:flex;align-items:center;gap:12px;background:#f8f9ff;padding:14px 16px;border-radius:12px;border:2px solid #ebebeb}
.task-item.completed{opacity:0.5;background:#f0f0f0}
.task-checkbox{width:18px;height:18px;cursor:pointer;accent-color:#6c63ff}
.task-text{flex:1;font-size:15px;color:#333}
.task-item.completed .task-text{text-decoration:line-through;color:#999}
.priority-badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.priority-High{background:#ffe0e0;color:#d63031}
.priority-Medium{background:#fff3cd;color:#e17055}
.priority-Low{background:#d4edda;color:#27ae60}
.delete-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;border-radius:8px}
body.dark{background:#1a1a2e}
body.dark .app-container{background:#16213e;box-shadow:0 10px 40px rgba(0,0,0,0.4)}
body.dark header h1{color:#fff}
body.dark #task-count{color:#aaa}
body.dark #task-input,body.dark #search-input,body.dark #priority-select{background:#0f3460;border-color:#444;color:#fff}
body.dark #add-btn{background:#e94560}
body.dark #theme-btn{background:#0f3460;border-color:#444;color:#fff}
body.dark .task-item{background:#0f3460;border-color:#444}
body.dark .task-text{color:#fff}
</style>
</head>
<body>
<div class="app-container">
<header>
<div class="header-top">
<h1>📝 My To-Do App</h1>
<button id="theme-btn">🌙 Dark</button>
</div>
<p id="task-count">0 tasks remaining</p>
</header>
<div class="search-section">
<input type="text" id="search-input" placeholder="🔍 Search tasks..."/>
</div>
<div class="add-task-section">
<input type="text" id="task-input" placeholder="Write a new task..."/>
<select id="priority-select">
<option value="Low">🟢 Low</option>
<option value="Medium" selected>🟡 Medium</option>
<option value="High">🔴 High</option>
</select>
<button id="add-btn">Add Task</button>
</div>
<ul id="task-list"></ul>
</div>
<script>
const taskInput=document.getElementById('task-input');
const addBtn=document.getElementById('add-btn');
const taskList=document.getElementById('task-list');
const taskCount=document.getElementById('task-count');
const prioritySelect=document.getElementById('priority-select');
const searchInput=document.getElementById('search-input');
const themeBtn=document.getElementById('theme-btn');
let tasks=JSON.parse(localStorage.getItem('tasks'))||[];
function saveTasks(){localStorage.setItem('tasks',JSON.stringify(tasks))}
function updateCount(){const r=tasks.filter(t=>!t.completed).length;taskCount.textContent=r+' tasks remaining'}
function renderTasks(){
taskList.innerHTML='';
tasks.forEach(function(task,index){
const li=document.createElement('li');
li.className='task-item'+(task.completed?' completed':'');
li.innerHTML=`
<input type="checkbox" class="task-checkbox" ${task.completed?'checked':''} onchange="toggleTask(${index})"/>
<span class="task-text">${task.text}</span>
<span class="priority-badge priority-${task.priority}">${task.priority}</span>
<button class="delete-btn" onclick="deleteTask(${index})">🗑️</button>`;
taskList.appendChild(li);
});
updateCount();
}
function addTask(){
const text=taskInput.value.trim();
if(text===''){alert('Please write a task first!');return}
tasks.push({id:Date.now(),text:text,completed:false,priority:prioritySelect.value});
saveTasks();renderTasks();taskInput.value='';
}
function deleteTask(index){
if(confirm('Delete this task?')){tasks.splice(index,1);saveTasks();renderTasks()}
}
function toggleTask(index){
tasks[index].completed=!tasks[index].completed;saveTasks();renderTasks();
}
addBtn.addEventListener('click',addTask);
taskInput.addEventListener('keypress',function(e){if(e.key==='Enter')addTask()});
searchInput.addEventListener('input',function(){
const s=searchInput.value.toLowerCase();
document.querySelectorAll('.task-item').forEach(function(t){
t.style.display=t.querySelector('.task-text').textContent.toLowerCase().includes(s)?'flex':'none';
});
});
themeBtn.addEventListener('click',function(){
document.body.classList.toggle('dark');
themeBtn.textContent=document.body.classList.contains('dark')?'☀️ Light':'🌙 Dark';
});
renderTasks();
</script>
</body>
</html>
